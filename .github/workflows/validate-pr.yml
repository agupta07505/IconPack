name: Validate Icon Pack PR

on:
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  validate:
    name: Validate metadata and WebP files
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Run validation
        id: validate
        run: |
          python3 << 'EOF'
          import json
          import os
          import sys

          errors = []
          REQUIRED_FIELDS = ["Name", "Author", "Filename"]

          try:
              with open("metadata.json", "r", encoding="utf-8") as f:
                  data = json.load(f)
          except (FileNotFoundError, json.JSONDecodeError) as e:
              print(f"::error::Failed to parse metadata.json: {e}")
              sys.exit(1)

          if not isinstance(data, list):
              print("::error::metadata.json must be a JSON array.")
              sys.exit(1)

          for i, entry in enumerate(data):
              label = entry.get("Name") or f"Entry #{i + 1}"

              # Check required fields are not blank
              for field in REQUIRED_FIELDS:
                  value = entry.get(field, "")
                  if not isinstance(value, str) or not value.strip():
                      errors.append(f"**[{label}]** Field `{field}` must not be blank.")

              # Check filename follows the naming convention: {Name}_{Author}.webp or {Name}.webp
              name = entry.get("Name", "").strip()
              author = entry.get("Author", "").strip()
              filename = entry.get("Filename", "").strip()
              if name and author and filename:
                  expected_full = f"{name}_{author}.webp"
                  expected_short = f"{name}.webp"
                  if filename not in (expected_full, expected_short):
                      errors.append(
                          f"**[{label}]** Filename `{filename}` is incorrect. "
                          f"Expected `{expected_full}` (or `{expected_short}`)."
                      )

              # Check that the WebP file exists in IconPack/ and is below 500 KB
              if filename:
                  webp_path = os.path.join("IconPack", filename)
                  if not os.path.isfile(webp_path):
                      errors.append(f"**[{label}]** WebP file `{filename}` not found in `IconPack/`.")
                  else:
                      size_kb = os.path.getsize(webp_path) / 1024
                      if size_kb >= 500:
                          errors.append(f"**[{label}]** `{filename}` is {size_kb:.1f} KB — must be below 500 KB.")

          if errors:
              summary = "\n".join(f"- {e}" for e in errors)
              # Write to step summary
              with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
                  f.write("## ❌ Validation Failed\n\n")
                  f.write(summary + "\n")
              # Write errors to output for the comment step
              escaped = summary.replace("%", "%25").replace("\n", "%0A").replace("\r", "%0D")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"errors={escaped}\n")
              print("Validation failed:")
              for e in errors:
                  print(f"  {e}")
              sys.exit(1)
          else:
              with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
                  f.write("## ✅ Validation Passed\n\nAll metadata fields are valid and WebP files exist.\n")
              print("All checks passed!")
          EOF

      - name: Comment on PR (failure)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const errors = `${{ steps.validate.outputs.errors }}`;
            const body = [
              '## ❌ Icon Pack Validation Failed',
              '',
              'Please fix the following issues before this PR can be merged:',
              '',
              errors || '- Unknown validation error. Check the workflow logs for details.',
              '',
              '**Rules:**',
              '- `Name`, `Author`, and `Filename` fields in `metadata.json` must not be blank.',
              '- Every `Filename` entry must have a matching WebP file inside `IconPack/`.',
              '- Filename must follow the format `{Name}_{Author}.webp` (or `{Name}.webp`).',
              '- WebP files must be **below 500 KB**.',
              '- `Link` is optional and may be left empty.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Comment on PR (success)
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '## ✅ Icon Pack Validation Passed\n\nAll metadata fields are valid and all WebP files exist in `IconPack/`.',
            });
